<section class="setup-page reveal">
  <header class="setup-page__header">
    <p class="setup-page__eyebrow">Setup</p>
    <h1>Edit Business</h1>
    <p>Summary, services and team are edited in tabs. Final submit validates all tabs.</p>
  </header>

  <section class="setup-card" *ngIf="isLoading">
    <p>Loading business profile...</p>
  </section>

  <nav class="setup-tabs" aria-label="Setup tabs" *ngIf="!isLoading">
    <button type="button" [class.active]="activeTab === 'summary'" (click)="setTab('summary')">1. Summary</button>
    <button type="button" [class.active]="activeTab === 'services'" (click)="setTab('services')">2. Services</button>
    <button type="button" [class.active]="activeTab === 'team'" (click)="setTab('team')">3. Team</button>
  </nav>

  <form [formGroup]="form" (ngSubmit)="submit()" class="setup-form" *ngIf="!isLoading">
    <app-setup-organisation-edit-summary-tab *ngIf="activeTab === 'summary'"></app-setup-organisation-edit-summary-tab>

    <app-setup-organisation-edit-services-tab *ngIf="activeTab === 'services'"></app-setup-organisation-edit-services-tab>

    <app-setup-organisation-edit-team-tab *ngIf="activeTab === 'team'"></app-setup-organisation-edit-team-tab>

    <div class="setup-form__actions">
      <button type="button" class="secondary" (click)="previousTab()" [disabled]="activeTab === 'summary' || isSubmitting">Back</button>
      <button type="button" class="secondary" (click)="nextTab()" *ngIf="activeTab !== 'team'" [disabled]="isSubmitting">Next</button>
      <button type="submit" *ngIf="activeTab === 'team'" [disabled]="isSubmitting">{{ isSubmitting ? 'Saving...' : 'Save changes' }}</button>
    </div>
  </form>
</section>
